name: agentzero
description: "特工·代号零（AgentZero）— 基于 tools/skills/MCP 的超级智能体"
publish_to: 'none'
version: 0.2.1+12

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  cached_network_image: ^3.4.1
  sign_in_with_apple: ^6.1.4
  intl: ^0.20.0
  flutter_markdown: ^0.7.7+1
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  share_plus: ^13.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

# 自动生成各平台启动图标。
# 改完图后执行: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  ios: true
  remove_alpha_ios: true
  android: false
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

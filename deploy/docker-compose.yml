name: agentzero

services:
  api:
    image: ghcr.io/${GITHUB_REPOSITORY:-agentzero/agentzero}/server:${IMAGE_TAG:-latest}
    container_name: agentzero-api
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_PATH: /var/lib/agentzero/agentzero.db
      WORKSPACE_ROOT: /var/lib/agentzero/workspaces
      JWT_SECRET: ${JWT_SECRET}
      APPLE_BUNDLE_ID: ${APPLE_BUNDLE_ID:-com.agentzero.me}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-}
      BOCHA_API_KEY: ${BOCHA_API_KEY:-}
      TZ: Asia/Shanghai
    volumes:
      - agentzero-data:/var/lib/agentzero
    networks:
      - agentzero-net
    # 不再 ports 暴露宿主机端口：仅通过 Caddy 反代访问
    # 原因：阿里云 ECS 国内地域对明文 HTTP（无论端口）会拦截，必须走 HTTPS

  caddy:
    image: caddy:2.8-alpine
    container_name: agentzero-caddy
    restart: unless-stopped
    ports:
      # 443 给 Caddy；80 留给宿主机现有的 nginx；故不绑 80
      - "443:443"
      - "443:443/udp"
    environment:
      AGENTZERO_DOMAIN: ${AGENTZERO_DOMAIN:-47-96-115-180.sslip.io}
      LE_EMAIL: ${LE_EMAIL:-admin@agentzero.app}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - agentzero-net
    depends_on:
      - api

volumes:
  agentzero-data:
  caddy-data:
  caddy-config:

networks:
  agentzero-net:
    driver: bridge
